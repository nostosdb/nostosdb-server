services:
  init:
    profiles: ["init"]
    build:
      context: ..
      dockerfile: nostdb-server/Dockerfile
    command:
      - init
      - --data-dir
      - /var/lib/nostdb
      - --config
      - /etc/nostdb/server.toml
      - --listen
      - 0.0.0.0:7878
    volumes:
      - nostdb-config:/etc/nostdb
      - nostdb-data:/var/lib/nostdb

  server:
    build:
      context: ..
      dockerfile: nostdb-server/Dockerfile
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - nostdb-config:/etc/nostdb
      - nostdb-data:/var/lib/nostdb
    restart: unless-stopped

volumes:
  nostdb-config:
  nostdb-data:
