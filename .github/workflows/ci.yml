# SPDX-License-Identifier: SSPL-1.0
name: CI

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, rust: stable}
          - {os: macos-latest, rust: stable}
          - {os: windows-latest, rust: stable}
          - {os: ubuntu-latest, rust: 1.85.0}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Server
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostosdb-server}
      - name: Check out Core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostosdb-core, path: nostosdb-core}
      - name: Configure Rust
        run: rustup toolchain install ${{ matrix.rust }} --profile minimal --component rustfmt,clippy
      - name: Format
        working-directory: nostosdb-server
        run: rustup run ${{ matrix.rust }} cargo fmt --all --check
      - name: Check
        working-directory: nostosdb-server
        run: rustup run ${{ matrix.rust }} cargo check --all-targets --all-features --locked
      - name: Clippy
        working-directory: nostosdb-server
        run: rustup run ${{ matrix.rust }} cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        working-directory: nostosdb-server
        run: rustup run ${{ matrix.rust }} cargo test --all-features --locked
      - name: Rustdoc
        working-directory: nostosdb-server
        env: {RUSTDOCFLAGS: "-D warnings"}
        run: rustup run ${{ matrix.rust }} cargo doc --all-features --no-deps --locked
      - name: Configure minimum Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: {node-version: "18"}
      - name: Configure candidate Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.13"}
      - name: Verify npm Server launcher and platform selection
        working-directory: nostosdb-server/npm
        run: npm test && npm run verify && npm pack --dry-run --json
      - name: Verify npm candidate tooling
        working-directory: nostosdb-server
        run: python -B -m unittest discover -s distribution/tests -v

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit
