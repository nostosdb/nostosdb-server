# SPDX-License-Identifier: SSPL-1.0
name: Attest release candidate

on: workflow_dispatch

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: macos-14, target: aarch64-apple-darwin}
          - {runner: macos-15-intel, target: x86_64-apple-darwin}
          - {runner: windows-11-arm, target: aarch64-pc-windows-msvc}
          - {runner: windows-2022, target: x86_64-pc-windows-msvc}
          - {runner: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu}
          - {runner: ubuntu-22.04, target: x86_64-unknown-linux-gnu}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out Server
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostosdb-server}
      - name: Check out Core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostosdb-core, path: nostosdb-core}
      - name: Check out CLI
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostosdb-cli, path: nostosdb-cli}
      - name: Configure target
        run: rustup target add ${{ matrix.target }}
      - name: Configure minimum Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with: {node-version: "18"}
      - name: Configure candidate Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.13"}
      - name: Verify Server npm package contracts
        working-directory: nostosdb-server/npm
        run: npm test && npm run verify
      - name: Verify exact CLI npm package contracts
        working-directory: nostosdb-cli/npm
        run: npm test && npm run verify
      - name: Build locked daemon candidate
        working-directory: nostosdb-server
        run: cargo build --release --locked --bin nostosd --target ${{ matrix.target }}
      - name: Build locked client candidate
        working-directory: nostosdb-cli
        run: cargo build --release --locked --bin nostos --target ${{ matrix.target }}
      - name: Verify native commands and stage npm packages
        shell: pwsh
        run: |
          $suffix = if ("${{ runner.os }}" -eq "Windows") { ".exe" } else { "" }
          & "nostosdb-server/target/${{ matrix.target }}/release/nostosd$suffix" --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "nostosdb-cli/target/${{ matrix.target }}/release/nostos$suffix" --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python nostosdb-server/distribution/scripts/stage_npm_candidate.py `
            --target "${{ matrix.target }}" `
            --binary "nostosdb-server/target/${{ matrix.target }}/release/nostosd$suffix" `
            --output "nostosdb-server/dist/npm-${{ matrix.target }}"
      - name: Package candidate and checksum
        shell: pwsh
        run: |
          $suffix = if ("${{ runner.os }}" -eq "Windows") { ".exe" } else { "" }
          $name = "nostosdb-0.0.1-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "nostosdb-server/dist/$name" | Out-Null
          Copy-Item "nostosdb-server/target/${{ matrix.target }}/release/nostosd$suffix" "nostosdb-server/dist/$name/"
          Copy-Item "nostosdb-cli/target/${{ matrix.target }}/release/nostos$suffix" "nostosdb-server/dist/$name/"
          Copy-Item -Recurse "nostosdb-server/distribution" "nostosdb-server/dist/$name/"
          Copy-Item "nostosdb-server/LICENSE", "nostosdb-server/NOTICE", "nostosdb-server/README.md" "nostosdb-server/dist/$name/"
          Compress-Archive -Path "nostosdb-server/dist/$name/*" -DestinationPath "nostosdb-server/dist/$name.zip"
          $hash = (Get-FileHash "nostosdb-server/dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Set-Content -NoNewline "nostosdb-server/dist/$name.zip.sha256"
      - name: Attest candidate provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            nostosdb-server/dist/*.zip
            nostosdb-server/dist/npm-${{ matrix.target }}/*.tgz
      - name: Upload candidate without publishing a release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nostosdb-${{ matrix.target }}
          path: |
            nostosdb-server/dist/*.zip
            nostosdb-server/dist/*.sha256
            nostosdb-server/dist/npm-${{ matrix.target }}/*.tgz
          if-no-files-found: error
